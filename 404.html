<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Istanbul Medipol Pan-African Club</title>
  <link rel="icon" href="images/logo.jpeg">
  <meta name="description" content="Istanbul Medipol Pan-African Club celebrates African unity, culture, leadership and community.">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <link rel="stylesheet" href="../css/styles.css">
  <script src="../js/main.js" defer></script>
</head>
  <style>
    .floating-contact-widget {
    position: fixed;
    right: 34px;
    bottom: 34px;
    width: 72px;
    height: 72px;
    z-index: 9999;
  }

  .float-main-btn,
  .float-option {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: none;
    position: absolute;
    right: 0;
    bottom: 0;

    display: flex;
    align-items: center;
    justify-content: center;

    color: white;
    font-size: 1.65rem;
    text-decoration: none;

    box-shadow: 0 14px 35px rgba(0,0,0,0.35);
    transition: 0.35s ease;
  }

  .float-main-btn {
    background: #c6d219;
    cursor: pointer;
    z-index: 5;
  }

  .float-main-btn:hover {
    transform: scale(1.08);
  }

  .float-option {
    opacity: 0;
    pointer-events: none;
    transform: translate(0, 0) scale(0.3);
  }

  .floating-contact-widget.active .float-option {
    opacity: 1;
    pointer-events: auto;
  }

  /* pop-out circle positions */
  .floating-contact-widget.active .option-instagram {
    transform: translate(-105px, -15px) scale(1);
  }

  .floating-contact-widget.active .option-email {
    transform: translate(-80px, -95px) scale(1);
  }

  .floating-contact-widget.active .option-phone {
    transform: translate(0, -130px) scale(1);
  }

  .floating-contact-widget.active .option-chat {
    transform: translate(-125px, -125px) scale(1);
  }

  /* colors */
  .option-instagram {
    background: #e1306c;
  }

  .option-email {
    background: #d4af37;
    color: #111;
  }

  .option-phone {
    background: #25d366;
  }

  .option-chat {
    background: #1e88e5;
    cursor: pointer;
  }

  /* labels */
  .float-option span {
    position: absolute;
    right: 78px;
    background: #111;
    color: #fff;
    font-size: 0.75rem;
    white-space: nowrap;
    padding: 6px 10px;
    border-radius: 20px;
    opacity: 0;
    transform: translateX(8px);
    transition: 0.25s ease;
    pointer-events: none;
  }

  .float-option:hover span {
    opacity: 1;
    transform: translateX(0);
  }

  /* mini chat */
  .mini-chat-panel {
    position: fixed;
    right: 34px;
    bottom: 125px;
    width: 320px;
    background: #111;
    border: 1px solid rgba(212,175,55,0.25);
    border-radius: 14px;
    overflow: hidden;
    display: none;
    z-index: 9998;
    box-shadow: 0 22px 60px rgba(0,0,0,0.45);
  }

  .mini-chat-panel.show {
    display: block;
  }

  .mini-chat-header {
    background: var(--green);
    color: white;
    padding: 16px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .mini-chat-header p {
    margin: 2px 0 0;
    font-size: 0.8rem;
    opacity: 0.75;
  }

  .mini-chat-header button {
    background: transparent;
    border: none;
    color: white;
    font-size: 1.7rem;
    cursor: pointer;
  }

  .mini-chat-body {
    padding: 18px;
  }

  .bot-msg {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.78);
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 16px;
  }

  .mini-chat-body a {
    display: block;
    color: var(--gold);
    text-decoration: none;
    font-weight: 700;
    margin-top: 12px;
  }

  /* mobile */
  @media (max-width: 768px) {
    .floating-contact-widget {
      right: 22px;
      bottom: 24px;
    }

    .float-main-btn,
    .float-option {
      width: 60px;
      height: 60px;
      font-size: 1.35rem;
    }

    .floating-contact-widget.active .option-instagram {
      transform: translate(-88px, -10px) scale(1);
    }

    .floating-contact-widget.active .option-email {
      transform: translate(-70px, -80px) scale(1);
    }

    .floating-contact-widget.active .option-phone {
      transform: translate(0, -110px) scale(1);
    }

    .floating-contact-widget.active .option-chat {
      transform: translate(-105px, -105px) scale(1);
    }

    .mini-chat-panel {
      right: 18px;
      bottom: 105px;
      width: calc(100% - 36px);
    }
  }
  </style>
